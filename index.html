<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Tiny Strike — a fast, tactical browser FPS with five maps, online rooms, bots, and competitive leaderboards." />
  <meta name="theme-color" content="#111914" />
  <title>Tiny Strike — Tactical Browser FPS</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; overscroll-behavior: none; }
    body { position: fixed; top: 0; left: 0; width: var(--layout-width, 100%); height: var(--layout-height, 100dvh); }
    #app { position: fixed; top: 0; left: 0; width: var(--layout-width, 100%); height: var(--layout-height, 100dvh); }
    #app canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    #hud { position: fixed; top: var(--app-top, 0); left: var(--app-left, 0); width: var(--app-width, 100%); height: var(--app-height, 100dvh); pointer-events: none; z-index: 10; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "./node_modules/three/build/three.module.js",
        "three/addons/": "./node_modules/three/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="hud"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
